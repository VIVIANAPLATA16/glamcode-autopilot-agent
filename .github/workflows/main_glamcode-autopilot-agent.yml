name: Build and deploy Node.js app to Azure Web App - glamcode-autopilot-agent

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: npm install and build
        working-directory: ./frontend
        env:
          # Used by next.config.mjs rewrites at build time.
          # Do NOT set NODE_ENV=production here — it skips devDependencies and breaks `next build`.
          BACKEND_URL: http://47.251.39.38:5000
        run: |
          npm install
          npm run build --if-present
          test -d .next || (echo "ERROR: .next build output missing" && exit 1)
          test -f .next/BUILD_ID || (echo "ERROR: .next/BUILD_ID missing" && exit 1)
          echo "Build OK — BUILD_ID=$(cat .next/BUILD_ID)"

      # upload-artifact@v4 excludes hidden files/dirs (like .next) by default
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: ./frontend
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}"}'

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'glamcode-autopilot-agent'
          slot-name: 'Production'
          package: .
